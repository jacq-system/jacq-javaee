<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

    <f:view locale="#{sessionManager.language}">
        <h:head>
            <f:facet name="first">
                <meta http-equiv="X-UA-Compatible" content="IE=edge" />
                <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
                <meta name="apple-mobile-web-app-capable" content="yes" />
            </f:facet>
            <title>JACQ</title>
            <h:outputScript name="js/nanoscroller.js" library="saga-layout" />
            <h:outputScript name="js/jacq.js" library="saga-layout" />

            <h:outputStylesheet library="jacq" name="jacq.css" />
            <h:outputStylesheet library="" name="icons.css" />
            <h:outputScript library="jacq" name="jacq.js" />

            <ui:insert name="head"/>
        </h:head>

        <h:body styleClass="main-body">

            <div class="wrapper">
                <ui:include src="topbar.xhtml" />

                <ui:include src="sidebar.xhtml" />

                <div class="main">
                    <h:form id="jacq_form">
                        <p:growl id="messages" showDetail="true" sticky="true" />

                        <ui:insert name="content"/>
                    </h:form>
                    <ui:insert name="content_noform"/>
                </div>
            </div>

            <p:ajaxStatus style="width:32px;height:32px;position:fixed;right:7px;bottom:7px">
                <f:facet name="start">
                    <p:graphicImage name="images/preloader.gif" library="saga-layout" style="width: 32px;"/>
                </f:facet>

                <f:facet name="complete">
                    <h:outputText value="" />
                </f:facet>
            </p:ajaxStatus>

            <h:outputStylesheet name="css/animate.css" library="saga-layout" />
            <h:outputStylesheet name="css/nanoscroller.css" library="saga-layout" />
            <h:outputStylesheet name="css/layout.css" library="saga-layout" />
            <h:outputStylesheet library="webjars" name="font-awesome/4.7.0/css/font-awesome-jsf.css" />
            <h:outputStylesheet library="webjars" name="font-awesome/4.7.0/css/font-awesome.min-jsf.css" />
        </h:body>

    </f:view>
</html>
