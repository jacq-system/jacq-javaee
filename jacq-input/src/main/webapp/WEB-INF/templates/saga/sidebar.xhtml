<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <div class="sidebar">
        <div class="nano">
            <div class="nano-content sidebar-scroll-content">
                <div class="logo">
                    <h:graphicImage library="jacq" name="jacq_logo.png" />
                </div>

                <div class="profile">
                </div>

                <div class="menu">
                    <h:form id="jacq_form-menu">
                        <p:slideMenu style="width:100%">
                            <p:submenu id="livingplant" label="#{messages['livingplant']}"  rendered="#{loginController.securityContext.isCallerInRole('createLivingplant') || loginController.securityContext.isCallerInRole('readLivingplant') || loginController.securityContext.isCallerInRole('inventory') || loginController.securityContext.isCallerInRole('indexSeminum') ? true : false}">
                                <p:menuitem id="livingplant_create" value="#{messages['create']}" outcome="/pages/livingplant/edit" rendered="#{loginController.securityContext.isCallerInRole('createLivingplant') ? true : false}"/>
                                <p:menuitem value="#{messages['manage']}"  outcome="/pages/livingplant/manage.xhtml" rendered="#{loginController.securityContext.isCallerInRole('readLivingplant') ? true : false}"/>
                                <p:submenu label="#{messages['inventory']}" rendered="#{loginController.securityContext.isCallerInRole('inventory') ? true : false}">
                                    <p:menuitem value="#{messages['create']}"  outcome="/pages/livingplant/inventoryedit.xhtml"/>
                                    <p:menuitem value="#{messages['manage']}" outcome="/pages/livingplant/inventories.xhtml"/>
                                </p:submenu>
                                <p:submenu label="#{messages['seminum']}" rendered="#{loginController.securityContext.isCallerInRole('indexSeminum') ? true : false}">
                                    <p:menuitem value="#{messages['livingplant.indexseminum']}" outcome="/pages/livingplant/indexseminum.xhtml"/>
                                    <p:menuitem value="#{messages['livingplant.revisioncreate']}" outcome="/pages/livingplant/revisioncreate.xhtml"/>
                                </p:submenu>
                            </p:submenu>
                            <p:submenu label="#{messages['seedexchange']}" rendered="#{loginController.securityContext.isCallerInRole('indexSeminum') ? true : false}">
                                <p:menuitem value="#{messages['create']}" outcome="/pages/seedexchange/edit.xhtml"/>
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/seedexchange/manage.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['location']}" rendered="#{loginController.securityContext.isCallerInRole('createOrganisation') ? true : false}">
                                <p:menuitem value="#{messages['create']}" outcome="/pages/organisation/edit.xhtml"/>
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/organisation/manage.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['treerecordfile']}" rendered="#{loginController.securityContext.isCallerInRole('createTreeRecordFile') ? true : false}">
                                <p:menuitem value="#{messages['create']}" outcome="/pages/treerecordfile/edit.xhtml"/>
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/treerecordfile/manage.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['databrowser']}" rendered="false">
                                <p:menuitem value="#{messages['databrowser.classificationbrowser']}" outcome="/pages/databrowser/classificationbrowser.xhtml"/>
                                <p:menuitem value="#{messages['databrowser.statistic']}" outcome="/pages/databrowser/statistic.xhtml"/>
                            </p:submenu>
                            <p:separator />
                            <p:submenu label="#{messages['user']}">
                                <p:menuitem value="#{messages['create']}" outcome="/pages/user/edit.xhtml" rendered="#{loginController.securityContext.isCallerInRole('createUser') ? true : false}"/>
                                <p:menuitem value="#{messages['update']}" outcome="/pages/user/update.xhtml"/>
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/user/manage.xhtml" rendered="#{loginController.securityContext.isCallerInRole('createUser') ? true : false}"/>
                            </p:submenu>
                            <p:submenu label="#{messages['literature']}" rendered="false">
                                <p:menuitem value="#{messages['create']}" outcome="/pages/literature/literaturecreate.xhtml"/>
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/literature/literaturemanage.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['nomenclature']}" rendered="false">
                                <p:menuitem value="#{messages['edit']}" outcome="/pages/nomenclature/nomenclaturecheck.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['chorology']}" rendered="false">
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/chrology/chorologyedit.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['observations']}" rendered="false">
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/observations/observationsmanage.xhtml"/>
                            </p:submenu>
                            <p:submenu label="#{messages['taxonomy']}" rendered="false">
                                <p:menuitem value="#{messages['taxonomy.genera']}" outcome="/pages/taxonomy/generacreate.xhtml"/>
                                <p:menuitem value="#{messages['taxonomy.species']}" outcome="/pages/taxonomy/speciescreate.xhtml"/>
                                <p:menuitem value="#{messages['taxonomy.family']}" outcome="/pages/taxonomy/familycreate.xhtml"/>
                                <p:menuitem value="#{messages['taxonomy.author']}" outcome="/pages/taxonomy/authorcreate.xhtml"/>
                                <p:menuitem value="#{messages['manage']}" outcome="/pages/taxonomy/taxonomymanage.xhtml"/>
                            </p:submenu>
                        </p:slideMenu>

                        <p:menu styleClass="jacq-menu-item" id="quickActions" rendered="#{(livingPlantEditController.livingPlantResult.derivativeId != null) ? true : false}">
                            <p:menuitem value="#{messages['save']}" onclick="PF('saveLivingPLantResultButton').jq.click();" />
                            <p:menuitem value="#{messages['copyandnew']}" onclick="PF('copyLivingPLantResultButton').jq.click();" />
                            <p:menuitem disabled="true" value="#{livingPlantEditController.livingPlantResult.scientificNameResult.scientificName}" />
                            <p:menuitem disabled="true" value="#{livingPlantEditController.livingPlantResult.accessionNumber}" />
                            <p:menuitem value="#{messages['worklabel']}" ajax="false">
                                <p:fileDownload value="#{livingPlantEditController.workLabel}" />
                            </p:menuitem>
                        </p:menu>
                    </h:form>
                </div>
            </div>
        </div>
    </div>

</ui:composition>
