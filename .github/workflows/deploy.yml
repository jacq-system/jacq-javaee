name: Deploy to Remote WildFly

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches: [main, master, feature/next]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      WILDFLY_HOST: ${{ vars.WILDFLY_HOST }}
      WILDFLY_PORT: ${{ vars.WILDFLY_PORT || '9990' }}
      WILDFLY_USERNAME: ${{ secrets.WILDFLY_USERNAME }}
      WILDFLY_PASSWORD: ${{ secrets.WILDFLY_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make Maven wrapper executable
      run: chmod +x jacq/mvnw
      if: ${{ github.event_name == 'workflow_dispatch' }}

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: jacq-artifacts
        path: artifacts
      if: ${{ github.event_name != 'workflow_dispatch' }}

    - name: Build with Maven if triggered manually
      run: cd jacq && ./mvnw -B package -DskipTests=true
      if: ${{ github.event_name == 'workflow_dispatch' }}

